<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../../backend/js/authGuard.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const user = await AuthGuard.requireAuth();
    if (!user) return;

    try {
        const progress = await DB.getProgressForUser(user.id);
        
        // Map for lesson cards - find them by title text
        const cardData = [
            { title: 'Thiên Nhiên', category: 'nature' },
            { title: 'giới Động vật', category: 'animals' },
            { title: 'Gia đình', category: 'family' }
        ];

        // Get all lesson card sections
        const allCards = document.querySelectorAll('section .group');

        allCards.forEach(card => {
            const h3 = card.querySelector('h3');
            if (!h3) return;

            const matched = cardData.find(cd => h3.textContent.includes(cd.title));
            if (!matched) return;

            // Find progress for this category
            const lessonProgress = progress.find(p => p.lessons?.category === matched.category);
            let pct = 0;
            if (lessonProgress) {
                pct = lessonProgress.total_questions > 0 
                    ? Math.round((lessonProgress.questions_completed / lessonProgress.total_questions) * 100) 
                    : 0;
            }

            // Update SVG progress circle
            const progressCircle = card.querySelectorAll('circle')[1];
            if (progressCircle) {
                const circumference = 125.6; // 2 * PI * 20
                const offset = circumference - (circumference * pct / 100);
                progressCircle.setAttribute('stroke-dashoffset', offset);
            }

            // Update percentage text
            const pctSpan = card.querySelector('.absolute.text-\\[10px\\]');
            if (pctSpan) pctSpan.textContent = `${pct}%`;

            // Update button text & link
            const btn = card.querySelector('button');
            if (btn) {
                btn.textContent = pct >= 100 ? '✓ Hoàn thành' : pct > 0 ? 'Tiếp tục học' : 'Bắt đầu';
                btn.addEventListener('click', () => {
                    window.location.href = `practice.html?topic=${matched.category}`;
                });
            }
        });

    } catch(err) {
        console.error('Lessons load error:', err);
    }
});
</script>
