<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../../backend/js/db.js"></script>
<script src="../../backend/js/authGuard.js"></script>
<script>
let QUESTIONS = [];
let currentQ = 0;
let isAnimating = false;
let score = 0;
let currentTopic = 'animals';
let currentLesson = null;
let currentUser = null;

function renderQuestion(index) {
    const q = QUESTIONS[index];
    if (!q) return;

    // Update progress numbers
    const progressEl = document.querySelector('.text-on-surface-variant');
    if (progressEl && progressEl.textContent.includes('/')) {
         progressEl.textContent = `${index + 1}/${QUESTIONS.length}`;
    }

    // Update progress bar
    const barInner = document.querySelector('.bg-primary-container');
    if (barInner) {
         const progressPercent = ((index + 1) / QUESTIONS.length) * 100;
         barInner.style.width = `${progressPercent}%`;
    }

    // Update speech bubble text
    const bubble = document.querySelector('.speech-bubble p');
    if (bubble) {
         bubble.textContent = q.instruction_text;
    }

    // Parse options from JSONB
    const options = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;

    // Update options container
    const container = document.getElementById('question-container');
    if (!container) return;
    container.innerHTML = '';

    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "aspect-square bg-surface-container-lowest rounded-xl cloud-shadow hover:scale-[1.02] transition-all duration-300 flex items-center justify-center p-6 group option-btn";
        btn.innerHTML = `<span class="text-6xl">${opt.emoji}</span><span class="block mt-2 text-sm font-bold text-on-surface-variant">${opt.name}</span>`;
        btn.style.cssText = "display:flex;flex-direction:column;align-items:center;justify-content:center;";

        btn.addEventListener('click', () => {
             if (isAnimating) return;

             // Reset siblings
             document.querySelectorAll('.option-btn').forEach(b => {
                 b.classList.remove('active-card');
                 b.style.boxShadow = "";
             });

             btn.classList.add('active-card');
             isAnimating = true;

             // Check answer
             if (opt.is_correct) {
                 score++;
                 btn.style.boxShadow = "0 0 0 6px #4CAF50";

                 setTimeout(() => {
                     isAnimating = false;
                     if (currentQ < QUESTIONS.length - 1) {
                         currentQ++;
                         renderQuestion(currentQ);
                         container.classList.add('animate-pulse');
                         setTimeout(() => container.classList.remove('animate-pulse'), 500);
                     } else {
                         finishLesson();
                     }
                 }, 1200);
             } else {
                 btn.style.boxShadow = "0 0 0 4px #F44336";
                 btn.style.transform = "translateX(5px)";
                 setTimeout(() => btn.style.transform = "translateX(-5px)", 100);
                 setTimeout(() => btn.style.transform = "translateX(5px)", 200);
                 setTimeout(() => btn.style.transform = "translateX(0)", 300);
                 setTimeout(() => {
                     btn.style.boxShadow = "";
                     btn.classList.remove('active-card');
                     isAnimating = false;
                 }, 800);
             }
        });

        container.appendChild(btn);
    });
}

async function finishLesson() {
    if (!currentUser || !currentLesson) {
        window.location.href = 'results.html';
        return;
    }

    const totalQuestions = QUESTIONS.length;
    // Stars: 3 if perfect, 2 if >=66%, 1 if >=33%, 0 otherwise
    let stars = 0;
    const pct = score / totalQuestions;
    if (pct >= 1) stars = 3;
    else if (pct >= 0.66) stars = 2;
    else if (pct >= 0.33) stars = 1;

    try {
        // Save progress
        await DB.upsertProgress(currentUser.id, currentLesson.id, totalQuestions, totalQuestions, score, stars);
        await DB.updateTotalStars(currentUser.id);

        // Check for new badges
        const newBadges = await DB.checkAndAwardBadges(currentUser.id);

        // Store results in sessionStorage for results page
        sessionStorage.setItem('last_exercise_result', JSON.stringify({
            topic: currentTopic,
            lessonTitle: currentLesson.title,
            score,
            totalQuestions,
            stars,
            newBadges: newBadges.map(b => ({ badge_name: b.badge_name, description: b.description, icon_url: b.icon_url })),
            timestamp: Date.now()
        }));
    } catch(err) {
        console.error('Error saving progress:', err);
        // Still store partial results
        sessionStorage.setItem('last_exercise_result', JSON.stringify({
            topic: currentTopic,
            lessonTitle: currentTopic,
            score,
            totalQuestions,
            stars: 0,
            newBadges: [],
            timestamp: Date.now()
        }));
    }

    window.location.href = 'results.html';
}

document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await AuthGuard.requireAuth();
    if (!currentUser) return;

    // Get topic from URL
    const urlParams = new URLSearchParams(window.location.search);
    currentTopic = urlParams.get('topic') || 'animals';

    try {
        // Fetch lesson and tasks from DB
        currentLesson = await DB.getLessonByCategory(currentTopic);
        if (!currentLesson) {
            alert('Không tìm thấy bài học!');
            window.location.href = 'lessons.html';
            return;
        }

        const tasks = await DB.getLessonTasks(currentLesson.id);
        if (!tasks || tasks.length === 0) {
            alert('Bài học chưa có câu hỏi!');
            window.location.href = 'lessons.html';
            return;
        }

        QUESTIONS = tasks;

        // Update header title
        const titleEl = document.querySelector('.font-headline.text-on-surface.font-extrabold');
        if (titleEl) titleEl.textContent = currentLesson.title;

        renderQuestion(0);
    } catch(err) {
        console.error('Error loading lesson:', err);
        alert('Lỗi tải bài học: ' + err.message);
    }
});
</script>
